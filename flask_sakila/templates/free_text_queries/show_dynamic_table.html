{% extends "base.html" %}

{% block body %}
    <table border="1">
        <thead>
            <tr>
                {% for field_name in field_names %}
                    <th>{{ field_name }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for result in results %}
                <tr>
                    {% for value in result %}
                        <td>{{ value }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>
    <form action="{{ index_link }}" method="POST">
        <button type="submit">Back</button>
    </form>
{% endblock %}
